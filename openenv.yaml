name: disaster-resource-allocation
version: "1.0.0"
description: >
  A multi-zone disaster response simulation where an AI agent must allocate
  limited emergency resources (food, medical kits, rescue teams) across
  disaster-affected zones.

author: Tanishq Tiwari

tags:
  - disaster-response
  - resource-allocation
  - multi-zone
  - triage
  - real-world

environment:
  type: sequential
  episodes: true
  max_steps_per_episode: 30

observation_space:
  type: Box
  dtype: float32
  shape_formula: "num_zones * 5 + 3"

action_space:
  type: Discrete
  size_formula: "3 * num_zones * 3"

reward:
  type: float
  range: [0.0, 1.0]

tasks:
  - id: easy
    difficulty: easy
    max_steps: 20
    success_threshold: 0.5
    grader: graders.EasyGrader

  - id: medium
    difficulty: medium
    max_steps: 25
    success_threshold: 0.3
    grader: graders.MediumGrader

  - id: hard
    difficulty: hard
    max_steps: 30
    success_threshold: 0.15
    grader: graders.HardGrader

api:
  reset: "Returns initial observation dict"
  step: "Returns (observation, reward, done, info)"
  state: "Returns current state"

setup:
  python: ">=3.9"
  install: "pip install -r requirements.txt"
  run: "python inference.py"   # 🔥 THIS IS THE FIX

baseline_scores:
  random_agent:
    easy: 0.35
    medium: 0.09
    hard: 0.05
  rule_based_agent:
    easy: 0.59
    medium: 0.16
    hard: 0.09
